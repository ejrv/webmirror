name: webmirror

on:
  workflow_dispatch:
    inputs:
      website_url:
        description: 'URL of the website to mirror'
        required: true
        default: 'https://example.com'
      output_dir:
        description: 'Directory to save the mirrored site'
        required: true
        default: '/mirrored'

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install wget
        run: sudo apt-get update && sudo apt-get install -y wget

      - name: Mirror website
        run: |
          wget \
            --mirror \
            --convert-links \
            --adjust-extension \
            --page-requisites \
            --no-parent \
            --directory-prefix=${{ inputs.output_dir }} \
            ${{ inputs.website_url }}

      - name: Upload mirrored site as artifact
        uses: actions/upload-artifact@v4
        with:
          name: mirrored-website
          path: ${{ inputs.output_dir }}
